<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velo — Sign Up</title>
    <meta name="description" content="Create your free Velo account and start sending email campaigns." />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/login.css">
    <script src="../js/theme.js"></script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card animate-in">
            <div style="text-align: center; margin-bottom: 8px;">
                <a href="../index.html" style="font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--text-primary); letter-spacing: 2px;">Velo</a>
            </div>
            <h1>Create Account</h1>
            
            <form id="signupForm">
                <input
                    class="login-input"
                    id="signupName"
                    type="text"
                    placeholder="Full Name"
                    required
                    autocomplete="name"
                />
                <input
                    class="login-input"
                    id="signupEmail"
                    type="email"
                    placeholder="Email address"
                    required
                    autocomplete="email"
                />
                <input
                    class="login-input"
                    id="signupPassword"
                    type="password"
                    placeholder="Password (min 4 characters)"
                    required
                    autocomplete="new-password"
                    minlength="4"
                />
                <button type="submit" class="btn-login" id="signupSubmitBtn">Create Account</button>
            </form>

            <div class="divider">or</div>
            
            <a href="login.html" style="text-decoration: none;">
                <button class="btn-google" style="background: var(--bg-primary); border-color: var(--border-primary);">
                    Already have an account? Log In
                </button>
            </a>
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
